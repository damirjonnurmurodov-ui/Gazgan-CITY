name: gazgan_city
description: Gazgan City official city services Flutter UI prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  go_router: ^17.2.3
  image_picker: ^1.2.2
  lucide_icons: ^0.257.0
  supabase_flutter: ^2.10.3
  url_launcher: ^6.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/app_icon.png

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
